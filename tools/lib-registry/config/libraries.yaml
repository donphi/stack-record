  alternatives: ["EasyOCR"]
  docs_tag: null

- number: 8
  name: "Florence-2"
  section: "eyes"
  function: "Visual-Semantic Alignment"
  tool_type: "Model"
  github_url: "https://huggingface.co/microsoft/Florence-2-large"
