  con: "Fragile. Requires massive fine-tuning for each new document type."
  alternatives: ["Pix2Struct"]
  docs_tag: null

- number: 7
  name: "pytesseract"
  section: "eyes"
  function: "Ingestion Integrity Probe"
  tool_type: "Library"
  github_url: "https://github.com/madmaze/pytesseract"
  pypi_name: "pytesseract"
  citation: "Google (2024)."
  pro: "Reliability. Used only to check page rotation before heavy models run."
