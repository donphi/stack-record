# config/libraries.yaml — Complete library inventory for research pipelines.
#
# PURPOSE: Single source of truth for every library, model, database,
#          service, and ontology evaluated for the pipeline.
# EDIT:    Add new entries here. Run sync_registry.py to update the DB.
#
# FIELDS:
#   number       — original numbering from the survey
#   name         — display name
#   section      — must match an id in sections.yaml
#   function     — what it does in the pipeline
#   tool_type    — Model | Library | Database | Service | API | Ontology
#   github_url   — canonical repository URL (or official website)
#   pypi_name    — PyPI package name (null if not on PyPI)
#   citation     — academic citation string
#   pro          — strategic advantage
#   con          — risk to mitigate
#   alternatives — list of plan-B tools
#   docs_tag     — optional path to a Stack Record page

# ═══════════════════════════════════════════════════════════════
#  SECTION 1: The "Eyes" (OCR, Layout & Vision)
# ═══════════════════════════════════════════════════════════════

- number: 1
  name: "Surya OCR"
  section: "eyes"
  function: "Optical Character Recognition"
  tool_type: "Model"
  github_url: "https://github.com/datalab-to/surya"
  pypi_name: "surya-ocr"
  citation: "Paruchuri, V. (2024)."
  pro: "Precision & Speed. Detects line-level bounding boxes in one GPU pass."
  con: "Resource Heavy. Requires 16GB VRAM for efficiency."
  alternatives: ["Tesseract", "PaddleOCR"]
  docs_tag: null

- number: 2
  name: "Marker"
  section: "eyes"
  function: "Optical Character Recognition"
  tool_type: "Model"
  github_url: "https://github.com/datalab-to/marker"
  pypi_name: "marker-pdf"
  citation: "Datalab (2024)."
  pro: "Math & Speed. Best-in-class at cleaning messy equations/headers into Markdown."
  con: "Heuristic Limits. Struggles with complex table structures."
  alternatives: ["Nougat", "MinerU"]
  docs_tag: null

- number: 3
  name: "Docling"
  section: "eyes"
  function: "Optical Character Recognition"
  tool_type: "Model"
  github_url: "https://github.com/docling-project/docling"
  pypi_name: "docling"
  citation: "Auer, C., et al. (2024)."
  pro: 'The "Second Opinion". A completely independent parsing engine (IBM).'
  con: "Complexity. Complex setup adds a heavy dependency chain."
  alternatives: ["Adobe Extract API"]
  docs_tag: null

- number: 4
  name: "PP-StructureV3"
  section: "eyes"
  function: "Optical Character Recognition"
  tool_type: "Model"
  github_url: "https://github.com/PaddlePaddle/PaddleOCR"
  pypi_name: "paddleocr"
  citation: "Li, C., et al. (2022)."
  pro: "Multilingual Robustness. Excellent at borderless tables."
  con: "Ecosystem Lock. Uses PaddlePaddle (not PyTorch), requiring a separate container."
  alternatives: ["TableFormer"]
  docs_tag: null

- number: 5
  name: "Nougat"
  section: "eyes"
  function: "Optical Character Recognition"
  tool_type: "Model"
  github_url: "https://github.com/facebookresearch/nougat"
  pypi_name: "nougat-ocr"
  citation: "Blecher, L., et al. (2023)."
  pro: "End-to-End. Good for pure math papers where layout doesn't matter."
  con: "Hallucination Risk. Generates text without bounding boxes (unverifiable)."
  alternatives: ["Marker"]
  docs_tag: null

- number: 6
  name: "Donut"
  section: "eyes"
  function: "Optical Character Recognition"
  tool_type: "Model"
  github_url: "https://github.com/clovaai/donut"
  pypi_name: null
  citation: "Kim, G., et al. (2022)."
