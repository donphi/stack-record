# tools/lib-registry — Docker Compose for library registry sync.
#
# PURPOSE: Single-service compose for running the library metadata sync script.
# USAGE:   docker compose run --rm lib-sync

services:
  lib-sync:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ../../content-src/docs/appendices:/app/site-out
